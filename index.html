<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ペットっち</title>
<style>
:root{--bg:#0a0614;--bg2:#120a20;--bg3:#1c1230;--card:#180e2a;--bor:rgba(200,120,255,.12);--bor2:rgba(200,120,255,.28);--pur:#a855f7;--pur2:#7c3aed;--pur-xl:rgba(168,85,247,.12);--pink:#f472b6;--gold:#f0b830;--grn:#10b981;--txt:#f8f0ff;--txt2:#b090d0;--txt3:#706090;--r:16px;--r2:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,.07),transparent 60%);pointer-events:none;}
/* ヘッダー */
.hdr{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:1;}
.hdr-title{font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{display:none;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:11px;cursor:pointer;font-family:inherit;}
.back-btn.show{display:block;}
/* ランチャー */
#launcher{flex:1;overflow-y:auto;padding:0 16px 24px;position:relative;z-index:1;}
/* ペット状態カード */
.pet-hero{background:linear-gradient(135deg,var(--card),var(--bg3));border:2px solid var(--bor2);border-radius:var(--r);padding:24px 20px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;}
.pet-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,.08),transparent 70%);}
.pet-emoji{font-size:64px;margin-bottom:10px;display:block;filter:drop-shadow(0 4px 12px rgba(168,85,247,.4));}
.pet-name{font-size:22px;font-weight:900;color:var(--txt);margin-bottom:4px;}
.pet-species{font-size:12px;color:var(--txt3);margin-bottom:12px;}
.trust-bar{background:rgba(255,255,255,.08);border-radius:20px;height:6px;margin:0 20px 6px;overflow:hidden;}
.trust-fill{height:100%;background:linear-gradient(90deg,var(--pur2),var(--pink));border-radius:20px;transition:width .6s;}
.trust-label{font-size:10px;color:var(--txt3);}
.pet-speech{background:rgba(255,255,255,.05);border-radius:var(--r2);padding:10px 14px;margin-top:12px;font-size:12px;color:var(--txt2);font-style:italic;line-height:1.7;position:relative;}
.no-pet{padding:30px 20px;text-align:center;}
.no-pet-txt{font-size:13px;color:var(--txt3);line-height:1.8;}
/* アクションボタン */
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.action-btn{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r2);padding:16px 8px;cursor:pointer;text-align:center;transition:.15s;font-family:inherit;}
.action-btn:active{transform:scale(.96);background:var(--pur-xl);}
.action-ico{font-size:24px;margin-bottom:6px;}
.action-nm{font-size:11px;font-weight:700;color:var(--txt2);}
/* アプリカード（シンプル版） */
.app-row{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:.15s;}
.app-row:active{background:var(--pur-xl);}
.app-row-ico{font-size:22px;width:40px;height:40px;border-radius:10px;background:var(--pur-xl);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-row-info{flex:1;}
.app-row-name{font-size:14px;font-weight:700;color:var(--txt);}
.app-row-desc{font-size:10px;color:var(--txt3);margin-top:2px;}
.app-row-arr{font-size:18px;color:var(--txt3);}
/* iframe */
#app-frame{display:none;flex:1;flex-direction:column;position:relative;z-index:1;}
#app-iframe{flex:1;border:none;width:100%;height:100%;}
/* シート（なりきり） */
#char-sheet{position:fixed;inset:0;z-index:100;pointer-events:none;}
#char-sheet.open{pointer-events:auto;}
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s;}
#char-sheet.open .sheet-overlay{background:rgba(0,0,0,.6);}
.sheet-body{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px 32px;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);}
#char-sheet.open .sheet-body{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--bor2);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:900;color:var(--txt);margin-bottom:14px;text-align:center;}
.char-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.char-preset-btn{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:12px;text-align:center;cursor:pointer;font-family:inherit;transition:.15s;}
.char-preset-btn:active{background:var(--pur-xl);border-color:var(--pur);}
.char-preset-ico{font-size:20px;display:block;margin-bottom:4px;}
.char-preset-nm{font-size:11px;font-weight:700;color:var(--txt2);}
.char-inp-row{display:flex;gap:8px;margin-bottom:14px;}
.char-inp{flex:1;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:13px;font-family:inherit;outline:none;}
.char-inp:focus{border-color:var(--pur);}
.sheet-go-btn{width:100%;padding:14px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--pur2),var(--pur));color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;}
/* タブバー */
.tabbar{display:none;background:var(--bg2);border-top:1.5px solid var(--bor);flex-shrink:0;}
.tabbar.show{display:flex;}
.tb{flex:1;padding:8px 4px 6px;border:none;background:none;color:var(--txt3);font-size:9px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
.tb .ti{font-size:20px;}
.tb.active{color:var(--pink);}
/* ローディング */
#frame-loading{display:none;position:fixed;inset:0;background:rgba(10,6,20,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
#frame-loading.show{display:flex;}
.frame-spinner{font-size:42px;animation:spin 1.5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.frame-loading-txt{font-size:12px;color:var(--txt2);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title" id="hdr-title">🐾 ペットっち</div>
  <button class="back-btn" id="back-btn" onclick="goHome()">← 戻る</button>
</div>

<div id="launcher">
  <!-- ペット状態 -->
  <div id="pet-hero" class="pet-hero">
    <div class="no-pet">
      <div style="font-size:48px;margin-bottom:12px;">🐾</div>
      <div class="no-pet-txt">ペットを選んでスタート<br>下のボタンからペットっちを開いてね</div>
    </div>
  </div>

  <!-- アクションボタン -->
  <div class="actions" id="action-btns" style="display:none;">
    <div class="action-btn" onclick="openApp('ai-petchi.html','🐾 ペットっち')">
      <div class="action-ico">💬</div>
      <div class="action-nm">話す</div>
    </div>
    <div class="action-btn" onclick="openCharSheet()">
      <div class="action-ico">🎭</div>
      <div class="action-nm">なりきり</div>
    </div>
    <div class="action-btn" onclick="openApp('ai-petchi.html','🐾 ペットっち')">
      <div class="action-ico">📊</div>
      <div class="action-nm">ようす</div>
    </div>
  </div>

  <!-- アプリ一覧（シンプル） -->
  <div id="app-list">
    <div class="app-row" onclick="openApp('ai-petchi.html','🐾 ペットっち')">
      <div class="app-row-ico">🐾</div>
      <div class="app-row-info">
        <div class="app-row-name">ペットっち</div>
        <div class="app-row-desc">育てる・話す・進化</div>
      </div>
      <div class="app-row-arr">›</div>
    </div>
    <div class="app-row" onclick="openCharSheet()">
      <div class="app-row-ico">🎭</div>
      <div class="app-row-info">
        <div class="app-row-name">なりきりモード</div>
        <div class="app-row-desc">好きなキャラになりきって会話</div>
      </div>
      <div class="app-row-arr">›</div>
    </div>
  </div>
</div>

<!-- iframe -->
<div id="app-frame"><iframe id="app-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe></div>

<!-- タブバー -->
<div class="tabbar" id="tabbar">
  <button class="tb" id="tb-home" onclick="goHome()"><span class="ti">🏠</span>ホーム</button>
  <button class="tb" id="tb-petchi" onclick="openApp('ai-petchi.html','🐾 ペットっち')"><span class="ti">🐾</span>ペット</button>
  <button class="tb" id="tb-narikiri" onclick="openCharSheet()"><span class="ti">🎭</span>なりきり</button>
</div>

<!-- なりきりシート -->
<div id="char-sheet">
  <div class="sheet-overlay" onclick="closeCharSheet()"></div>
  <div class="sheet-body">
    <div class="sheet-handle"></div>
    <div class="sheet-title">誰になりきる？</div>
    <div class="char-presets" id="char-presets"></div>
    <div class="char-inp-row">
      <input class="char-inp" id="char-inp" placeholder="キャラ名を自由入力...">
      <button onclick="startNarikiri(document.getElementById('char-inp').value)" style="padding:11px 16px;border-radius:var(--r2);border:none;background:var(--pur-xl);color:var(--pur);font-size:12px;font-weight:700;cursor:pointer;">OK</button>
    </div>
    <button class="sheet-go-btn" id="sheet-go-btn" onclick="startNarikiriFromSheet()">このキャラで話す 🎭</button>
  </div>
</div>

<!-- ローディング -->
<div id="frame-loading">
  <div class="frame-spinner">🐾</div>
  <div class="frame-loading-txt" id="frame-loading-txt">起動中...</div>
</div>

<script>
var PRESETS=[
  {ico:'🔵',nm:'ドラえもん'},{ico:'🌀',nm:'孫悟空'},{ico:'⚓',nm:'ルフィ'},
  {ico:'🔥',nm:'鬼滅・炭治郎'},{ico:'😄',nm:'明石家さんま'},{ico:'⚔',nm:'織田信長'}
];
var selectedChar='';
var currentApp='';

function renderPresets(){
  document.getElementById('char-presets').innerHTML=PRESETS.map(function(p){
    return '<div class="char-preset-btn" onclick="selectPreset(\''+p.nm+'\')">'
      +'<span class="char-preset-ico">'+p.ico+'</span>'
      +'<span class="char-preset-nm">'+p.nm+'</span></div>';
  }).join('');
}

function selectPreset(name){
  selectedChar=name;
  document.getElementById('char-inp').value=name;
  document.querySelectorAll('.char-preset-btn').forEach(function(b){b.style.borderColor='';b.style.background='';});
  event&&event.target.closest('.char-preset-btn')&&(event.target.closest('.char-preset-btn').style.borderColor='var(--pur)',event.target.closest('.char-preset-btn').style.background='var(--pur-xl)');
}

function openCharSheet(){
  document.getElementById('char-sheet').classList.add('open');
}
function closeCharSheet(){
  document.getElementById('char-sheet').classList.remove('open');
}

function startNarikiriFromSheet(){
  var name=document.getElementById('char-inp').value.trim()||selectedChar;
  startNarikiri(name);
}

function startNarikiri(charName){
  if(!charName){return;}
  closeCharSheet();
  // キャラデータをlocalStorageに保存してnarikiri-botへ
  localStorage.setItem('narikiri_pending_char',charName);
  openApp('narikiri-bot.html','🎭 '+charName);
}

function startNarikiri(charName){
  if(!charName) return;
  closeCharSheet();
  // otaku-engine経由でキャラ解析→narikiriへ
  localStorage.setItem('narikiri_pending_char',charName);
  // iframe経由でotaku-engineを開き解析→自動でnarikiriへ
  openApp('otaku-engine.html','🔍 '+charName+'を解析中...');
}

function openApp(url,title){
  currentApp=url;
  document.getElementById('frame-loading').classList.add('show');
  document.getElementById('frame-loading-txt').textContent=title;
  var iframe=document.getElementById('app-iframe');
  iframe.onload=function(){
    document.getElementById('frame-loading').classList.remove('show');
    // pending charがあれば送信
    var pending=localStorage.getItem('narikiri_pending_char');
    if(pending){
      if(url==='otaku-engine.html'){
        setTimeout(function(){try{iframe.contentWindow.postMessage({type:'AUTO_ANALYZE',charName:pending},'*');}catch(e){}},500);
      }
      if(url==='narikiri-bot.html'){
        localStorage.removeItem('narikiri_pending_char');
      }
    }
  };
  iframe.src=url;
  document.getElementById('launcher').style.display='none';
  document.getElementById('app-frame').style.display='flex';
  document.getElementById('tabbar').classList.add('show');
  document.getElementById('back-btn').classList.add('show');
  document.getElementById('hdr-title').textContent=title;
  var map={'ai-petchi.html':'tb-petchi','narikiri-bot.html':'tb-narikiri'};
  document.querySelectorAll('.tb').forEach(function(t){t.classList.remove('active');});
  if(map[url]) document.getElementById(map[url])&&document.getElementById(map[url]).classList.add('active');
}

function goHome(){
  document.getElementById('launcher').style.display='block';
  document.getElementById('app-frame').style.display='none';
  document.getElementById('tabbar').classList.remove('show');
  document.getElementById('back-btn').classList.remove('show');
  document.getElementById('hdr-title').textContent='🐾 ペットっち';
  document.getElementById('app-iframe').src='';
  document.querySelectorAll('.tb').forEach(function(t){t.classList.remove('active');});
  currentApp='';
  updatePetHero();
}

// ペット状態を表示
function updatePetHero(){
  var state=null;
  try{state=JSON.parse(localStorage.getItem('petState')||localStorage.getItem('pet_state')||'null');}catch(e){}
  var charData=null;
  try{charData=JSON.parse(localStorage.getItem('narikiri_char_data')||'null');}catch(e){}

  if(state&&state.name){
    var trust=state.trust||state.affection||0;
    var maxTrust=100;
    var pct=Math.min(100,Math.round(trust/maxTrust*100));
    var emoji=state.icon||state.emoji||'🐾';
    var speech=charData?'（'+charData.name+'としてなりきり中）':'「おかえり！」';
    document.getElementById('pet-hero').innerHTML=
      '<span class="pet-emoji">'+emoji+'</span>'
      +'<div class="pet-name">'+state.name+'</div>'
      +'<div class="pet-species">'+(state.species||state.type||'')+(state.level?' · Lv.'+state.level:'')+'</div>'
      +'<div class="trust-bar"><div class="trust-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="trust-label">信頼 '+trust+'/'+maxTrust+'</div>'
      +'<div class="pet-speech">'+speech+'</div>';
    document.getElementById('action-btns').style.display='grid';
    document.getElementById('app-list').style.display='none';
  } else {
    document.getElementById('action-btns').style.display='none';
    document.getElementById('app-list').style.display='block';
  }
}

// postMessage受信
window.addEventListener('message',function(e){
  if(!e.data) return;
  var iframe=document.getElementById('app-iframe');
  if(e.data.type==='CHAR_DATA'&&e.data.data){
    localStorage.setItem('narikiri_char_data',JSON.stringify(e.data.data));
    openApp('narikiri-bot.html','🎭 '+e.data.data.name);
    setTimeout(function(){try{iframe.contentWindow.postMessage({type:'CHAR_DATA',data:e.data.data},'*');}catch(ex){}},800);
    return;
  }
  if(e.data.type==='PET_NARIKIRI'){
    localStorage.removeItem('narikiri_pending_char');
    updatePetHero();
  }
});

renderPresets();
updatePetHero();
</script>
</body>
</html>
